# Build & publish Story Studio for macOS (Apple Silicon).
#
# Security:
# - No tokens/certs in this file. Only references to GitHub Actions Secrets.
# - Uses the ephemeral job GITHUB_TOKEN (auto-masked; dies with the job).
# - Apple signing secrets are optional. Blank secrets are never exported as
#   CSC_LINK (electron-builder treats empty CSC_LINK as a filesystem path).
# - Secrets are injected only into the packaging step env — never echoed,
#   never written to $GITHUB_ENV / artifacts / the GitHub Release.
# - No pull_request trigger (forks cannot use this to publish).
#
# Triggers:
#   - Manual: Actions → "Release macOS" → Run workflow
#   - Tag push: git tag vX.Y.Z && git push origin vX.Y.Z
#     (package.json "version" must match the tag, without the leading v)
#
# Optional repository Secrets (Settings → Secrets and variables → Actions):
#   CSC_LINK                      base64-encoded .p12 Developer ID cert
#   CSC_KEY_PASSWORD              password for that .p12
#   APPLE_ID                      Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD   app-specific password
#   APPLE_TEAM_ID                 10-char team id

name: Release macOS

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a GitHub Release (off = build + upload Actions artifacts only)"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

concurrency:
  group: release-macos-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build arm64 macOS
    runs-on: macos-latest
    timeout-minutes: 45
    if: github.repository == 'liel20946/story-studio'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Check tag matches package.json (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi

      - name: Build + publish release
        if: ${{ github.event_name == 'push' || inputs.publish }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # *_RAW keeps blank secrets from becoming empty CSC_LINK / APPLE_*.
          CSC_LINK_RAW: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_RAW: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID_RAW: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_RAW: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_RAW: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          # Mask before any tool can print them.
          [ -n "${CSC_LINK_RAW}" ] && echo "::add-mask::${CSC_LINK_RAW}"
          [ -n "${CSC_KEY_PASSWORD_RAW}" ] && echo "::add-mask::${CSC_KEY_PASSWORD_RAW}"
          [ -n "${APPLE_ID_RAW}" ] && echo "::add-mask::${APPLE_ID_RAW}"
          [ -n "${APPLE_APP_SPECIFIC_PASSWORD_RAW}" ] && echo "::add-mask::${APPLE_APP_SPECIFIC_PASSWORD_RAW}"
          [ -n "${APPLE_TEAM_ID_RAW}" ] && echo "::add-mask::${APPLE_TEAM_ID_RAW}"

          unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID || true

          if [ -n "${CSC_LINK_RAW}" ] && [ -n "${CSC_KEY_PASSWORD_RAW}" ]; then
            export CSC_LINK="${CSC_LINK_RAW}"
            export CSC_KEY_PASSWORD="${CSC_KEY_PASSWORD_RAW}"
            echo "Signing: enabled"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "Signing: disabled (unsigned build)"
          fi

          if [ -n "${APPLE_ID_RAW}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD_RAW}" ] && [ -n "${APPLE_TEAM_ID_RAW}" ]; then
            export APPLE_ID="${APPLE_ID_RAW}"
            export APPLE_APP_SPECIFIC_PASSWORD="${APPLE_APP_SPECIFIC_PASSWORD_RAW}"
            export APPLE_TEAM_ID="${APPLE_TEAM_ID_RAW}"
            echo "Notarization: credentials present"
          else
            echo "Notarization: skipped (no Apple ID secrets)"
          fi

          # Drop raw aliases from the environment before packaging.
          unset CSC_LINK_RAW CSC_KEY_PASSWORD_RAW APPLE_ID_RAW APPLE_APP_SPECIFIC_PASSWORD_RAW APPLE_TEAM_ID_RAW

          npm run dist:publish

      - name: Build only (no publish)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == false }}
        env:
          CSC_LINK_RAW: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_RAW: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID_RAW: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_RAW: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_RAW: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          [ -n "${CSC_LINK_RAW}" ] && echo "::add-mask::${CSC_LINK_RAW}"
          [ -n "${CSC_KEY_PASSWORD_RAW}" ] && echo "::add-mask::${CSC_KEY_PASSWORD_RAW}"
          [ -n "${APPLE_ID_RAW}" ] && echo "::add-mask::${APPLE_ID_RAW}"
          [ -n "${APPLE_APP_SPECIFIC_PASSWORD_RAW}" ] && echo "::add-mask::${APPLE_APP_SPECIFIC_PASSWORD_RAW}"
          [ -n "${APPLE_TEAM_ID_RAW}" ] && echo "::add-mask::${APPLE_TEAM_ID_RAW}"

          unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID || true

          if [ -n "${CSC_LINK_RAW}" ] && [ -n "${CSC_KEY_PASSWORD_RAW}" ]; then
            export CSC_LINK="${CSC_LINK_RAW}"
            export CSC_KEY_PASSWORD="${CSC_KEY_PASSWORD_RAW}"
            echo "Signing: enabled"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "Signing: disabled (unsigned build)"
          fi

          if [ -n "${APPLE_ID_RAW}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD_RAW}" ] && [ -n "${APPLE_TEAM_ID_RAW}" ]; then
            export APPLE_ID="${APPLE_ID_RAW}"
            export APPLE_APP_SPECIFIC_PASSWORD="${APPLE_APP_SPECIFIC_PASSWORD_RAW}"
            export APPLE_TEAM_ID="${APPLE_TEAM_ID_RAW}"
            echo "Notarization: credentials present"
          else
            echo "Notarization: skipped (no Apple ID secrets)"
          fi

          unset CSC_LINK_RAW CSC_KEY_PASSWORD_RAW APPLE_ID_RAW APPLE_APP_SPECIFIC_PASSWORD_RAW APPLE_TEAM_ID_RAW

          npm run build
          npx electron-builder --mac --publish never
          node scripts/generate-latest-mac-yml.mjs "${{ steps.version.outputs.version }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: story-studio-mac-${{ steps.version.outputs.version }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

      - name: Verify published release metadata
        if: ${{ github.event_name == 'push' || inputs.publish }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          echo "=== latest-mac.yml ==="
          # Public release asset URL — no credentials in the request.
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${TAG}/latest-mac.yml"
          echo
          echo "=== release assets (name + size only) ==="
          gh release view "$TAG" --json assets --jq '.assets[] | {name, size}'
