# Build & publish Story Studio for macOS (Apple Silicon).
#
# Security:
# - No tokens/certs in this file. Only references to GitHub Actions Secrets.
# - Uses the ephemeral job GITHUB_TOKEN (auto-masked; dies with the job).
# - Apple signing secrets are REQUIRED for publish. Blank CSC_* must never become
#   empty CSC_LINK (electron-builder treats that as a filesystem path).
# - Secrets are injected only into the packaging step env — never echoed,
#   never written to $GITHUB_ENV / artifacts / the GitHub Release.
# - No pull_request trigger (forks cannot use this to publish).
#
# Why signing is required:
#   macOS auto-update (Squirrel.Mac / electron-updater quitAndInstall) needs a
#   code-signed zip. Unsigned CI builds (1.5.8–1.5.11) downloaded fine but
#   Restart did nothing. Local Mac publishes work because Keychain signs with
#   Apple Development / Developer ID. CI must use the same cert via secrets.
#
# Triggers:
#   - Manual: Actions → "Release macOS" → Run workflow
#   - Tag push: git tag vX.Y.Z && git push origin vX.Y.Z
#     (package.json "version" must match the tag, without the leading v)
#
# Required repository Secrets (Settings → Secrets and variables → Actions):
#   CSC_LINK                      base64-encoded .p12 Developer ID Application cert
#   CSC_KEY_PASSWORD              password for that .p12
#
# Optional (notarization — recommended):
#   APPLE_ID                      Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD   app-specific password
#   APPLE_TEAM_ID                 10-char team id

name: Release macOS

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a GitHub Release (off = build + upload Actions artifacts only)"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

concurrency:
  group: release-macos-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build arm64 macOS
    runs-on: macos-latest
    timeout-minutes: 45
    if: github.repository == 'liel20946/story-studio'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Check tag matches package.json (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi

      - name: Require Apple signing secrets
        env:
          CSC_LINK_RAW: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_RAW: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${CSC_LINK_RAW}" ] || [ -z "${CSC_KEY_PASSWORD_RAW}" ]; then
            echo "::error::CSC_LINK and CSC_KEY_PASSWORD secrets are required."
            echo "Unsigned mac builds break auto-update (Restart does nothing)."
            echo "Export your Developer ID .p12 as base64 for CSC_LINK, set CSC_KEY_PASSWORD,"
            echo "or publish from a Mac with the cert in the keychain: GH_TOKEN=\$(gh auth token) npm run dist:publish"
            exit 1
          fi
          echo "Signing secrets: present"

      - name: Build + publish release
        if: ${{ github.event_name == 'push' || inputs.publish }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK_RAW: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_RAW: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID_RAW: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_RAW: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_RAW: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          [ -n "${CSC_LINK_RAW}" ] && echo "::add-mask::${CSC_LINK_RAW}"
          [ -n "${CSC_KEY_PASSWORD_RAW}" ] && echo "::add-mask::${CSC_KEY_PASSWORD_RAW}"
          [ -n "${APPLE_ID_RAW}" ] && echo "::add-mask::${APPLE_ID_RAW}"
          [ -n "${APPLE_APP_SPECIFIC_PASSWORD_RAW}" ] && echo "::add-mask::${APPLE_APP_SPECIFIC_PASSWORD_RAW}"
          [ -n "${APPLE_TEAM_ID_RAW}" ] && echo "::add-mask::${APPLE_TEAM_ID_RAW}"

          unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID || true

          export CSC_LINK="${CSC_LINK_RAW}"
          export CSC_KEY_PASSWORD="${CSC_KEY_PASSWORD_RAW}"
          echo "Signing: enabled"

          if [ -n "${APPLE_ID_RAW}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD_RAW}" ] && [ -n "${APPLE_TEAM_ID_RAW}" ]; then
            export APPLE_ID="${APPLE_ID_RAW}"
            export APPLE_APP_SPECIFIC_PASSWORD="${APPLE_APP_SPECIFIC_PASSWORD_RAW}"
            export APPLE_TEAM_ID="${APPLE_TEAM_ID_RAW}"
            echo "Notarization: credentials present"
          else
            echo "Notarization: skipped (no Apple ID secrets)"
          fi

          unset CSC_LINK_RAW CSC_KEY_PASSWORD_RAW APPLE_ID_RAW APPLE_APP_SPECIFIC_PASSWORD_RAW APPLE_TEAM_ID_RAW

          npm run dist:publish

      - name: Build only (no publish)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == false }}
        env:
          CSC_LINK_RAW: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_RAW: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID_RAW: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_RAW: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_RAW: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          [ -n "${CSC_LINK_RAW}" ] && echo "::add-mask::${CSC_LINK_RAW}"
          [ -n "${CSC_KEY_PASSWORD_RAW}" ] && echo "::add-mask::${CSC_KEY_PASSWORD_RAW}"
          [ -n "${APPLE_ID_RAW}" ] && echo "::add-mask::${APPLE_ID_RAW}"
          [ -n "${APPLE_APP_SPECIFIC_PASSWORD_RAW}" ] && echo "::add-mask::${APPLE_APP_SPECIFIC_PASSWORD_RAW}"
          [ -n "${APPLE_TEAM_ID_RAW}" ] && echo "::add-mask::${APPLE_TEAM_ID_RAW}"

          unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID || true

          export CSC_LINK="${CSC_LINK_RAW}"
          export CSC_KEY_PASSWORD="${CSC_KEY_PASSWORD_RAW}"
          echo "Signing: enabled"

          if [ -n "${APPLE_ID_RAW}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD_RAW}" ] && [ -n "${APPLE_TEAM_ID_RAW}" ]; then
            export APPLE_ID="${APPLE_ID_RAW}"
            export APPLE_APP_SPECIFIC_PASSWORD="${APPLE_APP_SPECIFIC_PASSWORD_RAW}"
            export APPLE_TEAM_ID="${APPLE_TEAM_ID_RAW}"
            echo "Notarization: credentials present"
          else
            echo "Notarization: skipped (no Apple ID secrets)"
          fi

          unset CSC_LINK_RAW CSC_KEY_PASSWORD_RAW APPLE_ID_RAW APPLE_APP_SPECIFIC_PASSWORD_RAW APPLE_TEAM_ID_RAW

          npm run build
          npx electron-builder --mac --publish never
          node scripts/generate-latest-mac-yml.mjs "${{ steps.version.outputs.version }}"

      - name: Verify zip is code-signed
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="$(ls release/Story*Studio-${VERSION}-arm64-mac.zip | head -1)"
          echo "Checking signatures inside: $ZIP"
          if ! unzip -l "$ZIP" | grep -q '_CodeSignature/CodeResources'; then
            echo "::error::Release zip has no _CodeSignature — unsigned builds break auto-update."
            exit 1
          fi
          TMP="$(mktemp -d)"
          ditto -xk "$ZIP" "$TMP"
          APP="$(find "$TMP" -maxdepth 1 -name '*.app' | head -1)"
          codesign --verify --deep --strict "$APP"
          codesign -dv --verbose=2 "$APP" 2>&1 | tee /tmp/codesign-dv.txt
          # Accept Developer ID (preferred) or Apple Development (matches local Mac publishes like 1.5.7).
          if ! grep -Eq 'Authority=(Developer ID Application|Apple Development)' /tmp/codesign-dv.txt; then
            echo "::error::App must be signed with Developer ID Application or Apple Development (not adhoc)."
            exit 1
          fi
          echo "Signature OK"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: story-studio-mac-${{ steps.version.outputs.version }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

      - name: Verify published release metadata
        if: ${{ github.event_name == 'push' || inputs.publish }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          echo "=== latest-mac.yml ==="
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${TAG}/latest-mac.yml"
          echo
          echo "=== release assets (name + size only) ==="
          gh release view "$TAG" --json assets --jq '.assets[] | {name, size}'
